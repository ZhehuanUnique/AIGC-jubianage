<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>剧变时代</title>
    <!-- Favicon（浏览器标签图标） -->
    <link rel="icon" type="image/svg+xml" href="./logo/favicon.svg" />
    <link rel="icon" type="image/png" href="./logo/favicon.png" />
    <link rel="apple-touch-icon" href="./logo/apple-touch-icon.png" />
    <!-- 预加载关键资源 -->
    <link rel="preload" href="./styles.css" as="style" />
    <link rel="preload" href="./main.js" as="script" />
    <link rel="preload" href="./logo/logo.png" as="image" />
    <link rel="stylesheet" href="./styles.css" />
    <!-- DNS 预解析和预连接，加速资源加载 -->
    <link rel="dns-prefetch" href="https://jubianai.cn" />
  </head>
  <body>
    <!-- 背景视频 - 优化加载：按需加载，支持 WebM（更小）和 MP4（回退） -->
    <video class="bg-video" autoplay muted loop playsinline preload="none" poster="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1920 1080'%3E%3Crect fill='%23070A12' width='1920' height='1080'/%3E%3C/svg%3E">
      <source src="./index.webm" type="video/webm" />
      <source src="./index.mp4" type="video/mp4" />
    </video>
    
    <main class="stage">
      <!-- Logo + 标题（左上角） -->
      <header class="header">
        <img class="header__logo" src="./logo/logo.png" alt="剧变时代 Logo" />
        <span class="header__title">剧变时代</span>
      </header>
      
      <section class="hero">
        <h1 class="hero__title">剧变时代</h1>
      </section>

      <section class="rail">
        <div class="marquee" data-marquee aria-label="作品流动展示">
          <div class="marquee__track" data-marquee-track>
            <!-- 只需要写一份 items，JS 会自动复制一份用于无缝循环 -->
            <a class="card" href="javascript:void(0)" aria-label="视频 01">
              <div class="card__thumb">
                <img class="card__img" src="./封面/2：3封面/20251218-214252.jpg" alt="封面 01" loading="lazy" decoding="async" fetchpriority="high" />
              </div>
              <div class="card__meta">
                <div class="card__title">AIGC 片段 01</div>
                <div class="card__sub">横向流动 · 4K 质感</div>
              </div>
            </a>
            <a class="card" href="javascript:void(0)" aria-label="视频 02">
              <div class="card__thumb">
                <img class="card__img" src="./封面/2：3封面/20251218-214301.jpg" alt="封面 02" loading="lazy" decoding="async" fetchpriority="high" />
              </div>
              <div class="card__meta">
                <div class="card__title">AIGC 片段 02</div>
                <div class="card__sub">丝滑缓动 · 无缝循环</div>
              </div>
            </a>
            <a class="card" href="javascript:void(0)" aria-label="视频 03">
              <div class="card__thumb">
                <img class="card__img" src="./封面/2：3封面/20251218-214305.jpg" alt="封面 03" loading="lazy" decoding="async" fetchpriority="low" />
              </div>
              <div class="card__meta">
                <div class="card__title">AIGC 片段 03</div>
                <div class="card__sub">GPU transform · 低功耗</div>
              </div>
            </a>
            <a class="card" href="javascript:void(0)" aria-label="视频 04">
              <div class="card__thumb">
                <img class="card__img" src="./封面/2：3封面/20251218-214313.jpg" alt="封面 04" loading="lazy" decoding="async" fetchpriority="low" />
              </div>
              <div class="card__meta">
                <div class="card__title">AIGC 片段 04</div>
                <div class="card__sub">hover 减速到停</div>
              </div>
            </a>
            <a class="card" href="javascript:void(0)" aria-label="视频 05">
              <div class="card__thumb">
                <img class="card__img" src="./封面/2：3封面/20251218-214319.jpg" alt="封面 05" loading="lazy" decoding="async" fetchpriority="low" />
              </div>
              <div class="card__meta">
                <div class="card__title">AIGC 片段 05</div>
                <div class="card__sub">移开恢复初速</div>
              </div>
            </a>
            <a class="card" href="javascript:void(0)" aria-label="视频 06">
              <div class="card__thumb">
                <img class="card__img" src="./封面/2：3封面/20251218-214252.jpg" alt="封面 06" loading="lazy" decoding="async" fetchpriority="low" />
              </div>
              <div class="card__meta">
                <div class="card__title">AIGC 片段 06</div>
                <div class="card__sub">渐隐遮罩 · 高级感</div>
              </div>
            </a>
            <a class="card" href="javascript:void(0)" aria-label="视频 07">
              <div class="card__thumb">
                <img class="card__img" src="./封面/2：3封面/20251218-214301.jpg" alt="封面 07" loading="lazy" decoding="async" fetchpriority="low" />
              </div>
              <div class="card__meta">
                <div class="card__title">AIGC 片段 07</div>
                <div class="card__sub">无依赖 · 可直接部署</div>
              </div>
            </a>
            <a class="card" href="javascript:void(0)" aria-label="视频 08">
              <div class="card__thumb">
                <img class="card__img" src="./封面/2：3封面/20251218-214305.jpg" alt="封面 08" loading="lazy" decoding="async" fetchpriority="low" />
              </div>
              <div class="card__meta">
                <div class="card__title">AIGC 片段 08</div>
                <div class="card__sub">丝滑不丢帧</div>
              </div>
            </a>
          </div>
        </div>
      </section>
    </main>

    <script src="./main.js"></script>
  </body>
</html>
